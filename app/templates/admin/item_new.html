{% extends "base.html" %}

{% block title %}New Item{% endblock %}

{% block content %}
<h2>Add New Item</h2>

<form action="/admin/items" method="post">
  <div class="form-group">
    <label for="name">Item Name</label>
    <input type="text" id="name" name="name" required>
  </div>

  <div class="form-group">
    <label for="category_id">Category</label>
    <select id="category_id" name="category_id" required>
      {% for cat in categories %}
        <option value="{{ cat.id }}">{{ cat.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="form-grid">
    <div class="form-group">
      <label for="needed_per_kit">Needed per Kit</label>
      <input type="number" id="needed_per_kit" name="needed_per_kit" value="1" min="1">
    </div>
    <div class="form-group">
      <label for="qty_per_package">Qty per Package</label>
      <input type="number" id="qty_per_package" name="qty_per_package" value="1" min="1">
    </div>
    <div class="form-group">
      <label for="cost_per_package">Cost per Package ($)</label>
      <input type="number" step="0.01" id="cost_per_package" name="cost_per_package" value="0">
    </div>
    <div class="form-group">
      <label for="source">Source</label>
      <input type="text" id="source" name="source">
    </div>
  </div>

  <button type="submit">Add Item</button>
  <a href="/admin/inventory" class="btn outline" style="margin-left:0.5rem;">Cancel</a>
</form>
{% endblock %}
